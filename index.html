<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>304</title>
  <meta name="description" content="304 — a four-player partnership trick-taking card game from Sri Lanka.">
  <meta name="color-scheme" content="light dark">
  <script>
    (function () {
      try {
        var qp = new URL(location.href).searchParams.get('theme');
        var t = (qp === 'dark' || qp === 'light') ? qp : localStorage.getItem('theme');
        if (qp) localStorage.setItem('theme', qp);
        if (t === 'dark' || t === 'light') document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="site-nav">
  <div class="site-nav-inner">
    <a href="./" class="site-nav-brand">304</a>
    <nav class="site-nav-links">
      <a href="rules.html">Rules</a>
      <a href="stats.html">Leaderboard</a>
      <a href="play.html" class="site-nav-cta">Play <span aria-hidden="true">→</span></a>
    </nav>
  </div>
</header>

<main class="hero">

  <section class="hero-mantra">
    <div class="hero-mantra-inner">
      <p class="hero-mantra-text">
        A four-player partnership trick-taking game from Sri Lanka. Learn the <a href="rules.html">rules</a>, check the <a href="stats.html">leaderboard</a>, or <a href="play.html">play</a> a hand.
      </p>

      <figure class="hero-table-figure" aria-hidden="true">
        <svg class="hero-table" viewBox="0 0 360 360" role="img">
          <defs>
            <pattern id="card-back" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
              <line x1="0" y1="0" x2="0" y2="6" stroke="currentColor" stroke-width="0.6" opacity="0.18" />
            </pattern>
          </defs>

          <!-- Partnership ties: dashed lines linking N-S and W-E.
               Drawn first so cards sit on top. -->
          <g class="hero-table-ties">
            <line class="tie tie-ns" x1="180" y1="68" x2="180" y2="292" />
            <line class="tie tie-we" x1="68"  y1="180" x2="292" y2="180" />
          </g>

          <!-- Four hands at compass positions, one suit each. -->
          <g class="hero-card hero-card-n" transform="translate(150 10)">
            <rect class="card-body" width="60" height="84" rx="7" />
            <rect class="card-pattern" x="6" y="6" width="48" height="72" rx="3" fill="url(#card-back)" />
            <text class="card-pip card-pip-tl" x="9" y="20">♠</text>
            <text class="card-pip card-pip-br" x="51" y="76" text-anchor="end">♠</text>
          </g>

          <g class="hero-card hero-card-s" transform="translate(150 266)">
            <rect class="card-body" width="60" height="84" rx="7" />
            <rect class="card-pattern" x="6" y="6" width="48" height="72" rx="3" fill="url(#card-back)" />
            <text class="card-pip card-pip-tl" x="9" y="20">♣</text>
            <text class="card-pip card-pip-br" x="51" y="76" text-anchor="end">♣</text>
          </g>

          <g class="hero-card hero-card-w" transform="translate(10 150)">
            <rect class="card-body" width="60" height="84" rx="7" />
            <rect class="card-pattern" x="6" y="6" width="48" height="72" rx="3" fill="url(#card-back)" />
            <text class="card-pip card-pip-tl" x="9" y="20">♥</text>
            <text class="card-pip card-pip-br" x="51" y="76" text-anchor="end">♥</text>
          </g>

          <g class="hero-card hero-card-e" transform="translate(290 150)">
            <rect class="card-body" width="60" height="84" rx="7" />
            <rect class="card-pattern" x="6" y="6" width="48" height="72" rx="3" fill="url(#card-back)" />
            <text class="card-pip card-pip-tl" x="9" y="20">♦</text>
            <text class="card-pip card-pip-br" x="51" y="76" text-anchor="end">♦</text>
          </g>

          <!-- The trick pile: three cards laid down at slight angles. -->
          <g class="hero-pile" transform="translate(180 180)">
            <rect class="pile-card" x="-30" y="-21" width="60" height="42" rx="4" transform="rotate(-14)" />
            <rect class="pile-card" x="-30" y="-21" width="60" height="42" rx="4" transform="rotate(6)" />
            <rect class="pile-card" x="-30" y="-21" width="60" height="42" rx="4" transform="rotate(-2)" />
          </g>
        </svg>
      </figure>
    </div>
  </section>

  <section class="hero-panel" aria-labelledby="hero-panel-title">
    <svg class="hero-lattice" viewBox="0 0 392 292" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
      <defs>
        <filter id="accent-glow" x="-100%" y="-100%" width="300%" height="300%">
          <feGaussianBlur stdDeviation="3" result="blur" />
          <feMerge>
            <feMergeNode in="blur" />
            <feMergeNode in="SourceGraphic" />
          </feMerge>
        </filter>
      </defs>
      <g class="hero-lattice-cells"></g>
    </svg>
    <div class="hero-panel-inner">
      <p class="hero-panel-eyebrow">304</p>
      <h2 id="hero-panel-title" class="hero-panel-title">
        Three hundred and four points.<br>Eight tricks. One partner.
      </h2>
      <a href="play.html" class="hero-cta">Play a hand <span aria-hidden="true">→</span></a>
    </div>
  </section>

</main>

<script>
  (function () {
    var host = document.querySelector('.hero-lattice-cells');
    if (!host) return;
    var SVG = 'http://www.w3.org/2000/svg';
    var suits = ['♠︎', '♥︎', '♦︎', '♣︎'];
    var sx = 30, sy = 26, pad = 16;
    var rows = 11;
    // Accents in the central visible band (cols 3-9), framing the title
    // without crossing rows 4-6 where the headline lives.
    var accent = {
      '2-4': 1, '2-8': 1,
      '3-3': 1, '3-9': 1,
      '7-2': 1, '7-8': 1,
      '8-4': 1, '8-7': 1
    };
    for (var row = 0; row < rows; row++) {
      var odd = row % 2;
      var cols = odd ? 12 : 13;
      var offset = odd ? sx / 2 : 0;
      for (var col = 0; col < cols; col++) {
        var x = pad + offset + col * sx;
        var y = pad + row * sy;
        var isAccent = accent[row + '-' + col];
        var g = document.createElementNS(SVG, 'g');
        g.setAttribute('class', 'lattice-cell' + (isAccent ? ' is-accent' : ''));
        g.setAttribute('style', '--cell-delay: ' + ((row + col) * 18) + 'ms');
        g.setAttribute('transform', 'translate(' + x + ' ' + y + ')');
        var t = document.createElementNS(SVG, 'text');
        t.setAttribute('text-anchor', 'middle');
        t.setAttribute('dominant-baseline', 'central');
        t.textContent = suits[(col + row) % 4];
        g.appendChild(t);
        host.appendChild(g);
      }
    }
  })();
</script>

<script src="js/theme.js?v=1"></script>
</body>
</html>
