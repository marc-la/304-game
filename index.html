<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>304 Game</title>
  <meta name="description" content="304 — a four-player partnership trick-taking card game from Sri Lanka.">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#fbf6e8" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#251812" media="(prefers-color-scheme: dark)">
  <script>
    (function () {
      try {
        var qp = new URL(location.href).searchParams.get('theme');
        var t = (qp === 'dark' || qp === 'light') ? qp : localStorage.getItem('theme');
        if (qp) localStorage.setItem('theme', qp);
        if (t === 'dark' || t === 'light') document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
    // Mark hero-reveal as JS-on so the unwrapped paragraph stays hidden
    // until hero-reveal.js wraps each word and adds .is-revealing.
    document.documentElement.classList.add('js-hero-anim');
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="site-nav">
  <div class="site-nav-inner">
    <a href="./" class="site-nav-brand">3<span class="brand-zero">0</span>4</a>
    <nav class="site-nav-links">
      <a href="rules.html">Rules</a>
      <a href="stats.html">Leaderboard</a>
    </nav>
  </div>
</header>

<main class="hero">

  <section class="hero-mantra">
    <div class="hero-mantra-inner">
      <p class="hero-mantra-text">
        A slow-burn duel of nerve and deduction. Learn the <a href="rules.html">rules</a> and check the <a href="stats.html">leaderboard</a>.
      </p>

      <figure class="hero-table-figure" aria-hidden="true">
        <svg class="hero-table" viewBox="0 0 360 360" role="img">
          <defs>
            <pattern id="card-back" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
              <line x1="0" y1="0" x2="0" y2="6" stroke="currentColor" stroke-width="0.6" opacity="0.18" />
            </pattern>
            <pattern id="card-back-fine" patternUnits="userSpaceOnUse" width="4" height="4" patternTransform="rotate(45)">
              <line x1="0" y1="0" x2="0" y2="4" stroke="currentColor" stroke-width="0.4" opacity="0.22" />
            </pattern>
          </defs>

          <!-- Stone piles: 10 per team, the visible scoreboard.
               Left = warm clay (Team A), Right = mossy green (Team B). -->
          <g class="hero-stones hero-stones-l">
            <rect class="stone" style="--stone-i:0" x="10" y="146" width="32" height="6" rx="2" fill="#b09275" />
            <rect class="stone" style="--stone-i:1" x="10" y="155" width="32" height="6" rx="2" fill="#a8855e" />
            <rect class="stone" style="--stone-i:2" x="10" y="164" width="32" height="6" rx="2" fill="#9c7d4f" />
            <rect class="stone" style="--stone-i:3" x="10" y="173" width="32" height="6" rx="2" fill="#b09275" />
            <rect class="stone" style="--stone-i:4" x="10" y="182" width="32" height="6" rx="2" fill="#a8855e" />
            <rect class="stone" style="--stone-i:5" x="10" y="191" width="32" height="6" rx="2" fill="#b39972" />
            <rect class="stone" style="--stone-i:6" x="10" y="200" width="32" height="6" rx="2" fill="#a08245" />
            <rect class="stone" style="--stone-i:7" x="10" y="209" width="32" height="6" rx="2" fill="#b09275" />
            <rect class="stone" style="--stone-i:8" x="10" y="218" width="32" height="6" rx="2" fill="#a08850" />
            <rect class="stone" style="--stone-i:9" x="10" y="227" width="32" height="6" rx="2" fill="#b39972" />
          </g>

          <g class="hero-stones hero-stones-r">
            <rect class="stone" style="--stone-i:0" x="318" y="146" width="32" height="6" rx="2" fill="#5d7565" />
            <rect class="stone" style="--stone-i:1" x="318" y="155" width="32" height="6" rx="2" fill="#6a8275" />
            <rect class="stone" style="--stone-i:2" x="318" y="164" width="32" height="6" rx="2" fill="#4f6a5b" />
            <rect class="stone" style="--stone-i:3" x="318" y="173" width="32" height="6" rx="2" fill="#728a7d" />
            <rect class="stone" style="--stone-i:4" x="318" y="182" width="32" height="6" rx="2" fill="#5d7565" />
            <rect class="stone" style="--stone-i:5" x="318" y="191" width="32" height="6" rx="2" fill="#6a8275" />
            <rect class="stone" style="--stone-i:6" x="318" y="200" width="32" height="6" rx="2" fill="#5b7868" />
            <rect class="stone" style="--stone-i:7" x="318" y="209" width="32" height="6" rx="2" fill="#4f6a5b" />
            <rect class="stone" style="--stone-i:8" x="318" y="218" width="32" height="6" rx="2" fill="#6f8478" />
            <rect class="stone" style="--stone-i:9" x="318" y="227" width="32" height="6" rx="2" fill="#5d7565" />
          </g>

          <!-- Partnership ties: N-S in cool teal, W-E in warm cinnabar.
               Each tie's colour also matches its pair's card stroke. -->
          <g class="hero-table-ties">
            <line class="tie tie-ns" x1="180" y1="120" x2="180" y2="240" />
            <line class="tie tie-we" x1="110" y1="180" x2="250" y2="180" />
          </g>

          <!-- Four hands at compass positions, partnership-coloured. -->
          <g class="hero-card hero-card-n" transform="translate(150 30)">
            <rect class="card-body" width="60" height="84" rx="7" />
            <rect class="card-pattern" x="6" y="6" width="48" height="72" rx="3" fill="url(#card-back)" />
            <text class="card-pip card-pip-tl" x="9" y="20">♠</text>
            <text class="card-pip card-pip-br" x="51" y="76" text-anchor="end">♠</text>
          </g>

          <g class="hero-card hero-card-s" transform="translate(150 246)">
            <rect class="card-body" width="60" height="84" rx="7" />
            <rect class="card-pattern" x="6" y="6" width="48" height="72" rx="3" fill="url(#card-back)" />
            <text class="card-pip card-pip-tl" x="9" y="20">♣</text>
            <text class="card-pip card-pip-br" x="51" y="76" text-anchor="end">♣</text>
          </g>

          <g class="hero-card hero-card-w" transform="translate(50 138)">
            <rect class="card-body" width="60" height="84" rx="7" />
            <rect class="card-pattern" x="6" y="6" width="48" height="72" rx="3" fill="url(#card-back)" />
            <text class="card-pip card-pip-tl" x="9" y="20">♥</text>
            <text class="card-pip card-pip-br" x="51" y="76" text-anchor="end">♥</text>
          </g>

          <g class="hero-card hero-card-e" transform="translate(250 138)">
            <rect class="card-body" width="60" height="84" rx="7" />
            <rect class="card-pattern" x="6" y="6" width="48" height="72" rx="3" fill="url(#card-back)" />
            <text class="card-pip card-pip-tl" x="9" y="20">♦</text>
            <text class="card-pip card-pip-br" x="51" y="76" text-anchor="end">♦</text>
          </g>

          <!-- Folded cuts: small face-down cards beside the trump,
               drawn before the trump so the trump sits on top. -->
          <g class="hero-folded hero-folded-l" transform="translate(135 175) rotate(-14)">
            <rect class="folded-body" x="-12" y="-17" width="24" height="34" rx="2.5" />
            <rect class="folded-pattern" x="-9" y="-14" width="18" height="28" rx="1" fill="url(#card-back-fine)" />
          </g>
          <g class="hero-folded hero-folded-r" transform="translate(225 187) rotate(10)">
            <rect class="folded-body" x="-12" y="-17" width="24" height="34" rx="2.5" />
            <rect class="folded-pattern" x="-9" y="-14" width="18" height="28" rx="1" fill="url(#card-back-fine)" />
          </g>

          <!-- The sealed trump: face-down at centre with a wax-seal hint.
               The .trump-face-up sibling is revealed during the flip moment. -->
          <g class="hero-trump" transform="translate(180 180)">
            <g class="hero-trump-flipper">
              <g class="trump-face-down" transform="rotate(-4)">
                <rect class="trump-shadow" x="-28" y="-39" width="60" height="84" rx="7" />
                <rect class="trump-body" x="-30" y="-42" width="60" height="84" rx="7" />
                <rect class="trump-pattern" x="-24" y="-36" width="48" height="72" rx="3" fill="url(#card-back)" />
                <circle class="trump-seal" cx="0" cy="0" r="3.5" />
              </g>
              <g class="trump-face-up" transform="rotate(-4)">
                <rect class="trump-body-up" x="-30" y="-42" width="60" height="84" rx="7" />
                <text class="trump-rank-corner" x="-23" y="-26">J</text>
                <text class="trump-suit-corner" x="-23" y="-13">♠</text>
                <text class="trump-rank-big" x="0" y="6" text-anchor="middle">♠</text>
                <text class="trump-rank-corner trump-corner-br" x="23" y="32" text-anchor="end">J</text>
                <text class="trump-suit-corner trump-corner-br" x="23" y="19" text-anchor="end">♠</text>
              </g>
            </g>
          </g>
        </svg>
      </figure>
    </div>
  </section>

</main>

<script type="module" src="js/theme.js"></script>
<script src="js/hero-reveal.js"></script>
</body>
</html>
