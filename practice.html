<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>304dle — Daily Caps Puzzle</title>
  <meta name="description" content="A daily 304 puzzle. One deal, three opponents, eight rounds. Call Caps when you're sure.">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#fbf6e8" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#251812" media="(prefers-color-scheme: dark)">
  <script>
    (function () {
      try {
        var qp = new URL(location.href).searchParams.get('theme');
        var t = (qp === 'dark' || qp === 'light') ? qp : localStorage.getItem('theme');
        if (qp) localStorage.setItem('theme', qp);
        if (t === 'dark' || t === 'light') document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="site-nav">
  <div class="site-nav-inner">
    <a href="./" class="site-nav-brand">3<span class="brand-zero">0</span>4</a>
    <nav class="site-nav-links">
      <a href="rules.html">Rules</a>
      <a href="practice.html" class="active">Daily</a>
      <a href="stats.html" class="site-nav-cta">Leaderboard</a>
    </nav>
  </div>
</header>

<!-- React mount point. The app is bundled by Vite from frontend/src/304dle/main.tsx.
     Pure CSR — no API calls, ships as static files (GitHub Pages compatible). -->
<div id="practice-root"></div>

<script type="module" src="js/theme.js"></script>
<script type="module" src="/frontend/src/304dle/main.tsx"></script>
</body>
</html>
